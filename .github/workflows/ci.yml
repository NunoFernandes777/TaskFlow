name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  audit:
    name: NPM audit
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm_audit
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit-report.json
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload audit report on failure
        if: steps.npm_audit.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: backend/npm-audit-report.json
          if-no-files-found: error

      - name: Fail if vulnerabilities were found
        if: steps.npm_audit.outputs.status != '0'
        shell: bash
        run: |
          echo "npm audit detected HIGH or CRITICAL vulnerabilities."
          exit 1

  build:
    name: Build and scan ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    needs:
      - lint
      - audit
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: backend
            dockerfile: backend/Dockerfile
            local_tag: taskflow-backend:scan
            repository: taskflow-backend
          - image_name: frontend
            dockerfile: frontend/Dockerfile
            local_tag: taskflow-frontend:scan
            repository: taskflow-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image version
        id: version
        shell: bash
        run: |
          echo "dockerhub_image=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.repository }}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build image locally for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ matrix.local_tag }}

      - name: Run Trivy scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.local_tag }}
          scanners: vuln
          format: sarif
          output: trivy-${{ matrix.image_name }}.sarif
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image_name }}-${{ github.ref_name }}
          path: trivy-${{ matrix.image_name }}.sarif
          if-no-files-found: warn

      - name: Fail build if critical vulnerabilities were found
        if: steps.trivy.outcome != 'success'
        shell: bash
        run: |
          echo "Trivy detected CRITICAL vulnerabilities in ${{ matrix.image_name }}."
          exit 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.version.outputs.dockerhub_image }}

  publish-staging-images:
    name: Publish staging ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    needs:
      - lint
      - audit
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: backend
            dockerfile: backend/Dockerfile
            repository: taskflow-backend
          - image_name: frontend
            dockerfile: frontend/Dockerfile
            repository: taskflow-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push latest image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.repository }}:latest

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: publish-staging-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    environment:
      name: staging
    env:
      KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_STAGING }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      STAGING_NAMESPACE: taskflow-staging
    steps:
      - name: Checkout repository
        if: env.KUBE_CONFIG_B64 != ''
        uses: actions/checkout@v4

      - name: Setup kubectl
        if: env.KUBE_CONFIG_B64 != ''
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"

      - name: Apply staging manifests
        if: env.KUBE_CONFIG_B64 != ''
        run: kubectl apply -f k8s/staging

      - name: Update staging images
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          kubectl set image deployment/taskflow-backend taskflow-backend=${DOCKERHUB_USERNAME}/taskflow-backend:latest -n ${STAGING_NAMESPACE}
          kubectl set image deployment/taskflow-frontend taskflow-frontend=${DOCKERHUB_USERNAME}/taskflow-frontend:latest -n ${STAGING_NAMESPACE}

      - name: Wait for staging rollout
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          kubectl rollout status deployment/taskflow-backend -n ${STAGING_NAMESPACE} --timeout=180s
          kubectl rollout status deployment/taskflow-frontend -n ${STAGING_NAMESPACE} --timeout=180s

      - name: Skip deployment when secret is absent
        if: env.KUBE_CONFIG_B64 == ''
        run: echo "KUBE_CONFIG_STAGING is not configured; staging deployment skipped."

  smoke-test:
    name: Smoke test staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    env:
      KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_STAGING }}
      STAGING_NAMESPACE: taskflow-staging
    steps:
      - name: Setup kubectl
        if: env.KUBE_CONFIG_B64 != ''
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"

      - name: Wait for pods to be ready
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          kubectl rollout status deployment/taskflow-backend -n ${STAGING_NAMESPACE} --timeout=180s

      - name: Port-forward backend service
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          kubectl port-forward service/taskflow-backend 18081:3001 -n ${STAGING_NAMESPACE} >/tmp/taskflow-port-forward.log 2>&1 &
          echo $! > /tmp/taskflow-port-forward.pid
          sleep 10

      - name: Check /health
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          curl --fail --silent http://127.0.0.1:18081/health | tee smoke-health.json
          grep '"status":"ok"' smoke-health.json

      - name: Stop port-forward
        if: always() && env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          if [ -f /tmp/taskflow-port-forward.pid ]; then
            kill "$(cat /tmp/taskflow-port-forward.pid)" || true
          fi

      - name: Skip smoke test when secret is absent
        if: env.KUBE_CONFIG_B64 == ''
        run: echo "KUBE_CONFIG_STAGING is not configured; smoke test skipped."

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
    env:
      KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      PRODUCTION_NAMESPACE: taskflow-production
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        if: env.KUBE_CONFIG_B64 != ''
        uses: actions/checkout@v4

      - name: Setup kubectl
        if: env.KUBE_CONFIG_B64 != ''
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"

      - name: Apply production manifests
        if: env.KUBE_CONFIG_B64 != ''
        run: kubectl apply -f k8s/production

      - name: Update production images
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          kubectl set image deployment/taskflow-backend taskflow-backend=${DOCKERHUB_USERNAME}/taskflow-backend:${RELEASE_TAG} -n ${PRODUCTION_NAMESPACE}
          kubectl set image deployment/taskflow-frontend taskflow-frontend=${DOCKERHUB_USERNAME}/taskflow-frontend:${RELEASE_TAG} -n ${PRODUCTION_NAMESPACE}

      - name: Wait for production rollout
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          kubectl rollout status deployment/taskflow-backend -n ${PRODUCTION_NAMESPACE} --timeout=180s
          kubectl rollout status deployment/taskflow-frontend -n ${PRODUCTION_NAMESPACE} --timeout=180s

      - name: Skip deployment when secret is absent
        if: env.KUBE_CONFIG_B64 == ''
        run: echo "KUBE_CONFIG_PRODUCTION is not configured; production deployment skipped."
