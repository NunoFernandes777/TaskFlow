name: TaskFlow CI/CD

on:
  pull_request:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: taskflow-backend
  FRONTEND_IMAGE_NAME: taskflow-frontend

jobs:
  backend-quality:
    name: Backend quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run lint
        run: npm run lint

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: backend-quality
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image_name:
          - taskflow-backend-scan
          - taskflow-frontend-scan
        include:
          - image_name: taskflow-backend-scan
            dockerfile: backend/Dockerfile
            target_image: taskflow-backend-scan:ci
          - image_name: taskflow-frontend-scan
            dockerfile: frontend/Dockerfile
            target_image: taskflow-frontend-scan:ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ matrix.target_image }}

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.target_image }}
          format: sarif
          output: trivy-${{ matrix.image_name }}.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image_name }}.sarif

      - name: Archive Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image_name }}-sarif
          path: trivy-${{ matrix.image_name }}.sarif
          if-no-files-found: warn

  publish-images:
    name: Build and publish images
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      owner_lc: ${{ steps.vars.outputs.owner_lc }}
      backend_image: ${{ steps.vars.outputs.backend_image }}
      frontend_image: ${{ steps.vars.outputs.frontend_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image names
        id: vars
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${REGISTRY}/${OWNER_LC}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${OWNER_LC}/${FRONTEND_IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.backend_image }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.frontend_image }}
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/${{ env.FRONTEND_IMAGE_NAME }}:latest

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: publish-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
    env:
      KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_STAGING }}
    steps:
      - name: Checkout repository
        if: env.KUBE_CONFIG_B64 != ''
        uses: actions/checkout@v4

      - name: Setup kubectl
        if: env.KUBE_CONFIG_B64 != ''
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"

      - name: Apply staging manifests
        if: env.KUBE_CONFIG_B64 != ''
        run: kubectl apply -f k8s/staging

      - name: Update staging images
        if: env.KUBE_CONFIG_B64 != ''
        run: |
          kubectl set image deployment/taskflow-backend taskflow-backend=${{ needs.publish-images.outputs.backend_image }} -n taskflow-staging
          kubectl set image deployment/taskflow-frontend taskflow-frontend=${{ needs.publish-images.outputs.frontend_image }} -n taskflow-staging

      - name: Wait for staging rollout
        if: env.KUBE_CONFIG_B64 != ''
        run: |
          kubectl rollout status deployment/taskflow-backend -n taskflow-staging --timeout=180s
          kubectl rollout status deployment/taskflow-frontend -n taskflow-staging --timeout=180s

      - name: Skip deployment when secret is absent
        if: env.KUBE_CONFIG_B64 == ''
        run: echo "KUBE_CONFIG_STAGING is not configured; staging deployment skipped."

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - publish-images
      - deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    env:
      KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
    steps:
      - name: Checkout repository
        if: env.KUBE_CONFIG_B64 != ''
        uses: actions/checkout@v4

      - name: Setup kubectl
        if: env.KUBE_CONFIG_B64 != ''
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"

      - name: Apply production manifests
        if: env.KUBE_CONFIG_B64 != ''
        run: kubectl apply -f k8s/production

      - name: Update production images
        if: env.KUBE_CONFIG_B64 != ''
        run: |
          kubectl set image deployment/taskflow-backend taskflow-backend=${{ needs.publish-images.outputs.backend_image }} -n taskflow-production
          kubectl set image deployment/taskflow-frontend taskflow-frontend=${{ needs.publish-images.outputs.frontend_image }} -n taskflow-production

      - name: Wait for production rollout
        if: env.KUBE_CONFIG_B64 != ''
        run: |
          kubectl rollout status deployment/taskflow-backend -n taskflow-production --timeout=180s
          kubectl rollout status deployment/taskflow-frontend -n taskflow-production --timeout=180s

      - name: Skip deployment when secret is absent
        if: env.KUBE_CONFIG_B64 == ''
        run: echo "KUBE_CONFIG_PRODUCTION is not configured; production deployment skipped."
