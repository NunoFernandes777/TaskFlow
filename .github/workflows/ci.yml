name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  NODE_CACHE_DIR: ~/.npm

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  lint:
    name: Lint (blocking)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm_audit
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit-report.json
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload audit report on failure
        if: steps.npm_audit.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: backend/npm-audit-report.json
          if-no-files-found: error

      - name: Fail if vulnerabilities were found
        if: steps.npm_audit.outputs.status != '0'
        shell: bash
        run: |
          echo "npm audit detected HIGH or CRITICAL vulnerabilities."
          exit 1
          

  build:
    name: Build and scan ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    needs:
      - lint
      - audit
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: backend
            dockerfile: backend/Dockerfile
            local_tag: taskflow-backend:scan
            repository: taskflow-backend
          - image_name: frontend
            dockerfile: frontend/Dockerfile
            local_tag: taskflow-frontend:scan
            repository: taskflow-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image version
        id: version
        shell: bash
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.repository }}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build image locally for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: |
            ${{ matrix.local_tag }}

      - name: Run Trivy scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.local_tag }}
          format: sarif
          output: trivy-${{ matrix.image_name }}.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image_name }}-${{ github.ref_name }}
          path: trivy-${{ matrix.image_name }}.sarif
          if-no-files-found: warn

      - name: Fail build if critical vulnerabilities were found
        if: steps.trivy.outcome != 'success'
        shell: bash
        run: |
          echo "Trivy detected CRITICAL vulnerabilities in ${{ matrix.image_name }}."
          exit 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.version.outputs.dockerhub_image }}

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs:
      - lint
      - audit
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    environment:
      name: staging
    env:
      KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_STAGING }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      STAGING_NAMESPACE: taskflow-staging
    steps:
      - name: Checkout repository
        if: env.KUBE_CONFIG_B64 != ''
        uses: actions/checkout@v4

      - name: Setup kubectl
        if: env.KUBE_CONFIG_B64 != ''
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"

      - name: Apply staging manifests
        if: env.KUBE_CONFIG_B64 != ''
        run: kubectl apply -f k8s/staging

      - name: Update staging images
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          kubectl set image deployment/taskflow-backend taskflow-backend=${DOCKERHUB_USERNAME}/taskflow-backend:latest -n ${STAGING_NAMESPACE}
          kubectl set image deployment/taskflow-frontend taskflow-frontend=${DOCKERHUB_USERNAME}/taskflow-frontend:latest -n ${STAGING_NAMESPACE}

      - name: Wait for staging rollout
        if: env.KUBE_CONFIG_B64 != ''
        shell: bash
        run: |
          kubectl rollout status deployment/taskflow-backend -n ${STAGING_NAMESPACE} --timeout=180s
          kubectl rollout status deployment/taskflow-frontend -n ${STAGING_NAMESPACE} --timeout=180s

      - name: Skip deployment when secret is absent
        if: env.KUBE_CONFIG_B64 == ''
        run: echo "KUBE_CONFIG_STAGING is not configured; staging deployment skipped."
          exit 1
