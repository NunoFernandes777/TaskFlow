name: TaskFlow CI/CD

on:
  push:
    branches:
      - main
      - staging
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  audit:
    name: NPM audit
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm_audit
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit-report.json
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload audit report on failure
        if: steps.npm_audit.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: backend/npm-audit-report.json
          if-no-files-found: error

      - name: Fail if vulnerabilities were found
        if: steps.npm_audit.outputs.status != '0'
        shell: bash
        run: |
          echo "npm audit detected HIGH or CRITICAL vulnerabilities."
          exit 1

  build:
    name: Build and scan ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    needs:
      - lint
      - audit
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: backend
            dockerfile: backend/Dockerfile
            local_tag: taskflow-backend:scan
            repository: taskflow-backend
          - image_name: frontend
            dockerfile: frontend/Dockerfile
            local_tag: taskflow-frontend:scan
            repository: taskflow-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image version
        id: version
        shell: bash
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.repository }}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build image locally for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: |
            ${{ matrix.local_tag }}

      - name: Run Trivy scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.local_tag }}
          format: sarif
          output: trivy-${{ matrix.image_name }}.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image_name }}-${{ github.ref_name }}
          path: trivy-${{ matrix.image_name }}.sarif
          if-no-files-found: warn

      - name: Fail build if critical vulnerabilities were found
        if: steps.trivy.outcome != 'success'
        shell: bash
        run: |
          echo "Trivy detected CRITICAL vulnerabilities in ${{ matrix.image_name }}."
          exit 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.version.outputs.dockerhub_image }}
