name: TaskFlow CI/CD

on:
  push:
    branches:
      - main
      - staging
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  audit:
    name: NPM audit
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm_audit
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit-report.json
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload audit report on failure
        if: steps.npm_audit.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: backend/npm-audit-report.json
          if-no-files-found: error

      - name: Fail if vulnerabilities were found
        if: steps.npm_audit.outputs.status != '0'
        shell: bash
        run: |
          echo "npm audit detected HIGH or CRITICAL vulnerabilities."
          exit 1
