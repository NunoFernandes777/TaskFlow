apiVersion: v1
kind: Service
metadata:
  name: taskflow-frontend
  namespace: taskflow-production
spec:
  type: NodePort
  selector:
    app: taskflow-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: taskflow-backend
  namespace: taskflow-production
spec:
  type: ClusterIP
  selector:
    app: taskflow-backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: taskflow-redis
  namespace: taskflow-production
spec:
  type: ClusterIP
  selector:
    app: taskflow-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379