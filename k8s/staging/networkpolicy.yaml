apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: taskflow-redis-ingress
  namespace: taskflow-staging
spec:
  podSelector:
    matchLabels:
      app: taskflow-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: taskflow-backend
      ports:
        - protocol: TCP
          port: 6379
